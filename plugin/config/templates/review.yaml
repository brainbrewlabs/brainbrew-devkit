# Code review workflow template
# Focused on code review without full planning/testing chain
#
# Usage: /chain-builder bump review

hooks:
  PostToolUse:
    - plugin:post-agent.cjs
  SubagentStart:
    - plugin:subagent-start.cjs
  SubagentStop:
    - plugin:subagent-stop.cjs

flow:
  code-reviewer:
    routes:
      END: "Review complete"
