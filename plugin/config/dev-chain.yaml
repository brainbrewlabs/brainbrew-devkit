name: dev-chain
description: "Standard development workflow — plan, review, implement, test, commit"
version: 1

agents:
  - name: planner
    existing: true
  - name: plan-reviewer
    existing: true
  - name: implementer
    existing: true
  - name: code-reviewer
    existing: true
  - name: tester
    existing: true
  - name: debugger
    existing: true
  - name: git-manager
    existing: true

flow:
  planner:
    next: plan-reviewer
  plan-reviewer:
    next: implementer
    on_issues: planner
  implementer:
    next: code-reviewer
  code-reviewer:
    next: tester
    on_issues: implementer
  tester:
    next: git-manager
    on_fail: debugger
  debugger:
    next: implementer
  git-manager:
    next: null

verification:
  planner:
    minLength: 300
    requiredAny: ["##", "1.", "step", "phase"]
  plan-reviewer:
    minLength: 100
    requiredAny: ["approved", "lgtm", "issue", "missing"]
  implementer:
    minLength: 100
    requiredAny: ["created", "modified", "updated", "wrote"]
  code-reviewer:
    minLength: 80
    requiredAny: ["approved", "lgtm", "issue", "bug"]
  tester:
    minLength: 50
    requiredAny: ["PASS", "FAIL", "passed", "failed"]
  debugger:
    minLength: 100
    requiredAny: ["root cause", "caused by", "fix", "solution"]
  git-manager:
    minLength: 30
    requiredAny: ["commit", "push", "staged"]
