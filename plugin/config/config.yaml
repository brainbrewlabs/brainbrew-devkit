# Plugin-level hook configuration.
# Per-project overrides: ~/.claude/projects/{encoded-path}/chain-config.yaml
# Path encoding: replace / with - (e.g., /Users/me/app -> -Users-me-app)
# Project hooks run AFTER plugin hooks for each event.
hooks:
  PostToolUse:
    - scripts/post-agent.cjs
  SubagentStart:
    - scripts/subagent-start.cjs
  SubagentStop:
    - scripts/subagent-stop.cjs
  Stop:
    - scripts/error-logger.cjs
